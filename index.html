<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>د. البار — المنصة الطبية</title>
<meta name="description" content="منصة د. محمد البار الطبية — تطبيقات للمرضى والأطباء وأطباء الأذن والأنف والحنجرة">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AlBar Hub">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --c1: #3b82f6;  /* blue   — مرضى */
    --c2: #10b981;  /* green  — أطباء */
    --c3: #f59e0b;  /* amber  — ENT */
    --c4: #8b5cf6;  /* purple — Rhino */
    --radius: 20px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* ── Header ── */
  header {
    padding: 28px 20px 16px;
    text-align: center;
  }

  .logo-ring {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    font-size: 28px;
    box-shadow: 0 0 0 4px rgba(139,92,246,.25);
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -.3px;
    color: var(--text);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    direction: ltr;
  }

  /* ── Grid ── */
  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 8px 16px 24px;
    max-width: 520px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 16px 24px;
    gap: 12px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform .18s ease, box-shadow .18s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity .18s;
  }

  .card:active { transform: scale(.96); }
  .card:active::before { opacity: 1; }

  .card-1::before { background: rgba(59,130,246,.12); }
  .card-2::before { background: rgba(16,185,129,.12); }
  .card-3::before { background: rgba(245,158,11,.12); }
  .card-4::before { background: rgba(139,92,246,.12); }

  .card-icon {
    width: 60px; height: 60px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }

  .card-1 .card-icon { background: rgba(59,130,246,.18);  box-shadow: 0 0 0 1px rgba(59,130,246,.3); }
  .card-2 .card-icon { background: rgba(16,185,129,.18);  box-shadow: 0 0 0 1px rgba(16,185,129,.3); }
  .card-3 .card-icon { background: rgba(245,158,11,.18);  box-shadow: 0 0 0 1px rgba(245,158,11,.3); }
  .card-4 .card-icon { background: rgba(139,92,246,.18);  box-shadow: 0 0 0 1px rgba(139,92,246,.3); }

  .card-label {
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    line-height: 1.25;
  }

  .card-1 .card-label { color: #60a5fa; }
  .card-2 .card-label { color: #34d399; }
  .card-3 .card-label { color: #fbbf24; }
  .card-4 .card-label { color: #a78bfa; }

  .card-sub {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.4;
    direction: ltr;
  }

  /* accent bar on top of each card */
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .card-1::after { background: var(--c1); }
  .card-2::after { background: var(--c2); }
  .card-3::after { background: var(--c3); }
  .card-4::after { background: var(--c4); }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 0 16px 20px;
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Install banner ── */
  #install-bar {
    display: none;
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 50px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
    z-index: 999;
    white-space: nowrap;
  }

  #install-bar span { font-size: 13px; color: var(--text); }
  #install-bar button {
    background: var(--c1);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  #dismiss-btn {
    background: none !important;
    color: var(--muted) !important;
    padding: 6px 8px !important;
  }
</style>
</head>
<body>

<header>
  <div class="logo-ring">⚕️</div>
  <h1>د. محمد البار</h1>
  <div class="subtitle">Medical Apps Platform</div>
</header>

<div class="grid">

  <a class="card card-1" href="https://malbarr.github.io/Albar-Health-V2" target="_blank" rel="noopener">
    <div class="card-icon">🫀</div>
    <div class="card-label">للمرضى<br>v2</div>
    <div class="card-sub">Patient Health App</div>
  </a>

  <a class="card card-2" href="https://malbarr.github.io/ORL101/" target="_blank" rel="noopener">
    <div class="card-icon">🩺</div>
    <div class="card-label">للأطباء</div>
    <div class="card-sub">Clinic App</div>
  </a>

  <a class="card card-3" href="https://malbarr.github.io/orl-daily" target="_blank" rel="noopener">
    <div class="card-icon">👂</div>
    <div class="card-label">للـ ENT</div>
    <div class="card-sub">Daily ENT Literature</div>
  </a>

  <a class="card card-4" href="https://malbarr.github.io/sv-update" target="_blank" rel="noopener">
    <div class="card-icon">🧠</div>
    <div class="card-label">Rhino · Lary<br>SB · Sleep</div>
    <div class="card-sub">SV Update</div>
  </a>

</div>

<footer>
  AlBar Medical Platform · 2026
</footer>

<!-- Install banner -->
<div id="install-bar">
  <span>أضف للشاشة الرئيسية</span>
  <button id="install-btn">تثبيت</button>
  <button id="dismiss-btn">✕</button>
</div>

<script>
  let deferredPrompt;

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const bar = document.getElementById('install-bar');
    bar.style.display = 'flex';
  });

  document.getElementById('install-btn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('install-bar').style.display = 'none';
  });

  document.getElementById('dismiss-btn').addEventListener('click', () => {
    document.getElementById('install-bar').style.display = 'none';
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>

</body>
</html>
